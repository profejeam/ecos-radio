  <script>
    let currentButton = null;

    function playDemo(audioUrl, buttonElement) {
      const player = document.getElementById('demo-player');
      const iconContainer = buttonElement.querySelector('.play-icon');
      const textContainer = buttonElement.querySelector('span');

      // Si el mismo audio está reproduciéndose, lo pausamos
      if (player.src === audioUrl && !player.paused) {
        player.pause();
        resetButton(buttonElement);
        currentButton = null;
      } else {
        // Si había otro botón activo, lo restauramos
        if (currentButton && currentButton !== buttonElement) {
          resetButton(currentButton);
        }

        // Cargamos la nueva URL y reproducimos
        player.src = audioUrl;
        player.play();
        currentButton = buttonElement;

        // Cambiamos el icono a "Pausa" (Dos barras verticales) y el texto
        iconContainer.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        textContainer.innerText = 'Pausar';
      }

      // Al terminar el audio de forma natural, restauramos el botón
      player.onended = function() {
        if (currentButton) {
          resetButton(currentButton);
          currentButton = null;
        }
      };
    }

    function resetButton(btn) {
      const icon = btn.querySelector('.play-icon');
      const txt = btn.querySelector('span');
      icon.innerHTML = '<path d="M8 5v14l11-7z"/>'; // Cambia de nuevo a triángulo de Play
      txt.innerText = 'Probar';
    }
  </script>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.opacity = '1';
          entry.target.style.transform = 'translateY(0)';
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.song-card, .program-card, .news-featured, .news-small, .gallery-item').forEach(el => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(20px)';
      el.style.transition = 'opacity 0.5s ease, transform 0.5s ease, border-color 0.25s';
      observer.observe(el);
    });
  </script>
